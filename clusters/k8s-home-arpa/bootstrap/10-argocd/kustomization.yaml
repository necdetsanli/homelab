apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# All resources from install.yaml are namespace-less.
# This ensures they are applied to the argocd namespace.
namespace: argocd

resources:
  - install.yaml
  # ArgoCD namespace network policies — applied BEFORE ArgoCD starts.
  # Prevents circular dependency: ArgoCD must not manage its own network
  # access, or any CNP breakage creates an unrecoverable deadlock.
  - argocd-network-policies.yaml

# Enterprise tuning patches (strategic merge into base manifests)
patches:
  - path: patches/argocd-cmd-params.yaml