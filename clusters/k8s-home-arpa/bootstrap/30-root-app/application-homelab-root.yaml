apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homelab-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: bootstrap
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  source:
    repoURL: https://github.com/necdetsanli/homelab.git
    targetRevision: "main"
    path: clusters/k8s-home-arpa/apps/infra/root
  syncPolicy:
    automated:
      # prune disabled — root app prune would cascade-delete ALL child
      # Applications. Use `argocd app sync homelab-root --prune` manually.
      prune: false
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - ServerSideApply=true