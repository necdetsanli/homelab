# OpenTelemetry Collector — central telemetry pipeline (DaemonSet mode).
#
# Data flow:
#   Applications -> OTLP (4317/4318) -> Collector -> routes to:
#     Metrics  -> Mimir (OTLP HTTP)
#     Logs     -> Loki  (OTLP HTTP)
#     Traces   -> Tempo  (OTLP gRPC) + Jaeger (OTLP gRPC)
#
#   Prometheus receiver (pull-based) scrapes:
#     Cilium Agent  (:9962)  — network dataplane metrics
#     Hubble        (:9965)  — L3/L4/L7 flow observability
#     CoreDNS       (:9153)  — DNS resolution metrics
#
# DaemonSet ensures one collector per node for host metrics collection.
# Applications send OTLP to: otel-collector.opentelemetry.svc:4317 (gRPC)
#                          or otel-collector.opentelemetry.svc:4318 (HTTP)
#
# Prometheus SD RBAC: see prometheus-rbac.yaml (ClusterRole + ClusterRoleBinding)
---
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel-collector
  namespace: opentelemetry
spec:
  mode: daemonset
  # The operator auto-selects the collector image+tag based on its own version.
  # The contrib variant is configured via collectorImage.repository in the
  # operator Helm values (application-otel-operator.yaml).
  # Do NOT hardcode image: here — it breaks when tags are removed from Docker Hub.
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 300m
      memory: 384Mi
  env:
    # Node name for hostmetrics attribution
    - name: K8S_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
  # Volume mounts for host metrics (requires PSA baseline)
  volumeMounts:
    - name: hostfs
      mountPath: /hostfs
      readOnly: true
  volumes:
    - name: hostfs
      hostPath:
        path: /
  config:
    receivers:
      # OTLP receiver — primary ingestion point for applications
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      # Host metrics — CPU, memory, disk, network, load
      hostmetrics:
        collection_interval: 30s
        root_path: /hostfs
        scrapers:
          cpu: {}
          memory: {}
          disk: {}
          filesystem: {}
          network: {}
          load: {}
      # Pull-based Prometheus scraping for components that expose /metrics.
      # Kubernetes SD discovers pods and filters by labels/annotations.
      # RBAC: see prometheus-rbac.yaml (ClusterRole + ClusterRoleBinding).
      prometheus:
        config:
          scrape_configs:
            # ── Cilium Agent — network dataplane metrics (:9962) ──────────
            - job_name: cilium-agent
              scrape_interval: 30s
              kubernetes_sd_configs:
                - role: pod
              relabel_configs:
                - source_labels: [__meta_kubernetes_namespace]
                  regex: kube-system
                  action: keep
                - source_labels: [__meta_kubernetes_pod_label_k8s_app]
                  regex: cilium
                  action: keep
                - source_labels: [__meta_kubernetes_pod_ip]
                  action: replace
                  target_label: __address__
                  replacement: ${1}:9962
                - source_labels: [__meta_kubernetes_pod_node_name]
                  target_label: node
                - source_labels: [__meta_kubernetes_pod_name]
                  target_label: pod
            # ── Hubble — L3/L4/L7 flow observability (:9965) ─────────────
            - job_name: hubble
              scrape_interval: 30s
              kubernetes_sd_configs:
                - role: pod
              relabel_configs:
                - source_labels: [__meta_kubernetes_namespace]
                  regex: kube-system
                  action: keep
                - source_labels: [__meta_kubernetes_pod_label_k8s_app]
                  regex: cilium
                  action: keep
                - source_labels: [__meta_kubernetes_pod_ip]
                  action: replace
                  target_label: __address__
                  replacement: ${1}:9965
                - source_labels: [__meta_kubernetes_pod_node_name]
                  target_label: node
                - source_labels: [__meta_kubernetes_pod_name]
                  target_label: pod
            # ── CoreDNS — DNS resolution metrics (:9153) ─────────────────
            - job_name: coredns
              scrape_interval: 30s
              kubernetes_sd_configs:
                - role: pod
              relabel_configs:
                - source_labels: [__meta_kubernetes_namespace]
                  regex: kube-system
                  action: keep
                - source_labels: [__meta_kubernetes_pod_label_k8s_app]
                  regex: kube-dns
                  action: keep
                - source_labels: [__meta_kubernetes_pod_ip]
                  action: replace
                  target_label: __address__
                  replacement: ${1}:9153
                - source_labels: [__meta_kubernetes_pod_node_name]
                  target_label: node
                - source_labels: [__meta_kubernetes_pod_name]
                  target_label: pod
    processors:
      # Batch traces/metrics/logs for efficient export
      batch:
        timeout: 10s
        send_batch_size: 1024
      # Memory limiter prevents OOM kills
      memory_limiter:
        check_interval: 5s
        limit_mib: 300
        spike_limit_mib: 75
      # Add Kubernetes metadata to telemetry
      resourcedetection:
        detectors:
          - env
          - system
        system:
          hostname_sources:
            - os
    exporters:
      # Metrics -> Mimir via OTLP HTTP
      otlphttp/mimir:
        endpoint: http://mimir-gateway.monitoring.svc.cluster.local:80/otlp
      # Logs -> Loki via OTLP HTTP
      otlphttp/loki:
        endpoint: http://loki-gateway.logging.svc.cluster.local:80/otlp
      # Traces -> Tempo via OTLP gRPC
      otlp/tempo:
        endpoint: tempo.tracing.svc.cluster.local:4317
        tls:
          insecure: true
      # Traces -> Jaeger via OTLP gRPC (unified service in chart 4.x)
      otlp/jaeger:
        endpoint: jaeger.tracing.svc.cluster.local:4317
        tls:
          insecure: true
    service:
      pipelines:
        metrics:
          receivers:
            - otlp
            - hostmetrics
            - prometheus
          processors:
            - memory_limiter
            - resourcedetection
            - batch
          exporters:
            - otlphttp/mimir
        logs:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - batch
          exporters:
            - otlphttp/loki
        traces:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - batch
          exporters:
            - otlp/tempo
            - otlp/jaeger
