# Allow Kubernetes API server to reach validating/mutating webhooks.
#
# Uses CiliumNetworkPolicy with fromEntities: kube-apiserver.
# With Cilium native routing (no VXLAN tunnel), the API server's reserved
# identity (ID 7) is preserved end-to-end. No need for host/remote-node
# workarounds. This is the enterprise-grade approach.
#
# Port restrictions limit blast radius. TLS mutual authentication on
# webhooks provides the authorization layer.
---
# cert-manager webhook (port 10250)
# Validates: Certificate, Issuer, ClusterIssuer, etc.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-apiserver-webhook
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: "webhook"
  ingress:
    - fromEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "10250"
              protocol: TCP
---
# cert-manager controller (port 9402 — metrics endpoint)
# Kubelet liveness/readiness probes are implicitly allowed by Cilium.
# This rule exists for API-server-initiated health checks and future-proofing.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-apiserver-controller
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: "controller"
  ingress:
    - fromEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "9402"
              protocol: TCP
---
# Longhorn admission + conversion webhooks (ports 9502, 9501)
# Validates: Volume, Setting, Node, etc.
# Longhorn manager pods serve both admission and conversion webhooks.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-apiserver-webhook
  namespace: longhorn-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector:
    matchLabels:
      app: longhorn-manager
  ingress:
    - fromEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "9502"
              protocol: TCP
            - port: "9501"
              protocol: TCP
---
# Longhorn intra-namespace communication
# Manager pods call their own admission webhook service (pod-to-pod),
# driver-deployer init container calls manager API, CSI plugin pods
# communicate with manager. All require intra-namespace ingress.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-longhorn-internal
  namespace: longhorn-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - {}
---
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# OpenTelemetry operator webhook (port 9443)
# Validates/Mutates: OpenTelemetryCollector, Instrumentation, etc.
# Without this rule the default-deny NetworkPolicy blocks API server →
# webhook traffic, causing "context deadline exceeded" on every
# OpenTelemetryCollector create/update.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-apiserver-webhook
  namespace: opentelemetry
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: opentelemetry-operator
  ingress:
    - fromEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "9443"
              protocol: TCP
---
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Mimir rollout-operator webhook (port 443)
# Validates: StatefulSet scale-down, pod eviction, zone-aware PDB.
# This webhook intercepts ALL StatefulSet mutations in the monitoring
# namespace — including non-Mimir workloads like zabbix-postgresql.
# Without this rule every StatefulSet sync in monitoring times out.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-apiserver-rollout-operator-webhook
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: rollout-operator
  ingress:
    - fromEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# ECK operator webhook (port 9443)
# Validates: Elasticsearch, Kibana, Agent, Beat, EnterpriseSearch, etc.
# The ECK operator registers a ValidatingWebhookConfiguration
# (elastic-webhook.k8s.elastic.co) that intercepts all Elastic CRD
# mutations. Without this rule, ES cluster creation/updates are blocked.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-apiserver-webhook
  namespace: elastic-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector:
    matchLabels:
      control-plane: elastic-operator
  ingress:
    - fromEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "9443"
              protocol: TCP
