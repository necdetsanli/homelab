# ArgoCD pods communicate heavily within the namespace:
#   server ↔ redis, controller ↔ repo-server, applicationset ↔ server, etc.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-intra-namespace
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - {}
