---
# kube-system: Cilium, CoreDNS, Hubble, metrics-server.
# Critical namespace — egress allows MUST cover DNS client resolution
# and Hubble relay → agent before this deny takes effect.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: kube-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# cilium-spire: SPIRE server + agent for mutual TLS identity.
