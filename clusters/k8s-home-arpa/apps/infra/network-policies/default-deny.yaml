# Default-deny ingress AND egress for all managed namespaces.
#
# Companion allow policies provide explicit exceptions:
#   allow-egress-core.yaml     — DNS + API server (every namespace)
#   allow-egress-services.yaml — per-component egress (Vault, GitHub, NFS, etc.)
#   allow-webhooks.yaml        — API server → webhook ingress
#   allow-gateway-ingress.yaml — Envoy → backend service ingress
#   allow-kube-system.yaml     — CoreDNS, Hubble, metrics-server ingress
#   allow-spire.yaml           — SPIRE agent → server ingress
#
# Egress allow rules use CiliumNetworkPolicy (identity-based, L7-aware).
# The deny baseline uses Kubernetes NetworkPolicy (CNI-agnostic, auditable).
# NOTE: argocd namespace default-deny lives in bootstrap/10-argocd/
# to avoid circular dependency (ArgoCD managing its own network access).
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
