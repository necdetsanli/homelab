# Allow egress to CoreDNS (port 53) and Kubernetes API server (port 6443)
# for every managed namespace. Without these, pods cannot resolve DNS or
# interact with the Kubernetes API — both are foundational to any workload.
#
# Pattern: one CiliumNetworkPolicy per namespace, explicit port restriction.
# Uses Cilium identity selectors instead of CIDR for zero-trust correctness.
---
# ── argocd ──────────────────────────────────────────────────────────────────
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-dns-apiserver
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
---
