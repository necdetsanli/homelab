# ── kube-system ─────────────────────────────────────────────────────────────
# CoreDNS itself needs to reach upstream resolvers. Hubble relay, metrics-
# server, and other kube-system pods also need DNS + API access.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-dns-apiserver
  namespace: kube-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
