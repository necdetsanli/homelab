# Per-namespace egress allow rules for service-specific traffic flows.
#
# These supplement allow-egress-core.yaml (DNS + API server). Each rule
# targets the minimum required endpoints, ports, and pod selectors.
#
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# argocd — intra-namespace + GitHub for git fetch
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
---
# ArgoCD pods communicate heavily within the namespace:
#   server ↔ redis, controller ↔ repo-server, applicationset ↔ server, etc.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-intra-namespace
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - {}
---
# repo-server fetches manifests from GitHub over HTTPS.
# Uses toFQDNs — Cilium DNS proxy intercepts the lookup and populates
# allow rules for resolved IPs. Requires dns-proxy (enabled by default).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-github
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: argocd-repo-server
  egress:
    - toFQDNs:
        - matchName: "github.com"
        - matchName: "api.github.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# Helm chart sources — cert-manager, Longhorn, HashiCorp, Gateway API
# ArgoCD repo-server fetches Helm index + tarballs from these registries.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-helm-repos
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: argocd-repo-server
  egress:
    - toFQDNs:
        - matchName: "charts.jetstack.io"
        - matchName: "charts.longhorn.io"
        - matchName: "helm.releases.hashicorp.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# cert-manager — Vault PKI + intra-namespace (webhook ↔ controller)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-intra-namespace
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - {}
---
# cert-manager controller issues certs via Vault PKI.
# Traffic: pod → HAProxy VIP (192.168.20.22:443) → Vault leader (:8200)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-vault
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: cert-manager
  egress:
    - toCIDR:
        - "192.168.20.22/32"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# security — VSO → Vault + intra-namespace
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-intra-namespace
  namespace: security
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - {}
---
# VSO syncs secrets from Vault via the same HAProxy VIP.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-vault
  namespace: security
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: vault-secrets-operator
  egress:
    - toCIDR:
        - "192.168.20.22/32"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# longhorn-system — intra-namespace + host/remote-node for data replication
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
---
# Longhorn manager ↔ instance-manager ↔ CSI plugin communication.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-intra-namespace
  namespace: longhorn-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - {}
---
# Longhorn data plane: instance-manager pods replicate volume data to
# other nodes. CSI plugin registers with kubelet (host). Backup engine
# ships snapshots to NFS target (192.168.20.50 — TrueNAS).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-longhorn-data
  namespace: longhorn-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector: {}
  egress:
    - toEntities:
        - host
        - remote-node
    - toCIDR:
        - "192.168.20.50/32"
      toPorts:
        - ports:
            - port: "2049"
              protocol: TCP
---
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# kube-system — intra-namespace + host/remote-node
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
---
# Hubble UI → Hubble Relay, CoreDNS → upstream forwarders, etc.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-intra-namespace
  namespace: kube-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - {}
---
# metrics-server → kubelet (host), CoreDNS → upstream DNS (host network),
# Hubble relay → cilium-agent gRPC (host network on each node).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-host
  namespace: kube-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector: {}
  egress:
    - toEntities:
        - host
        - remote-node
---
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# cilium-spire — intra-namespace
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
---
# SPIRE server ↔ SPIRE agent communication within the namespace.
# Agent → Server is also covered by allow-spire.yaml ingress rule.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-intra-namespace
  namespace: cilium-spire
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - {}
---
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# gateway-system — intra-namespace
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
---
# Gateway controller and future pods within the namespace.
# Cilium embedded Envoy runs with hostNetwork (exempt from NetworkPolicy),
# so this primarily covers the Gateway API controller pod.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-intra-namespace
  namespace: gateway-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - {}
---
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# monitoring + logging — intra-namespace only (extend when deploying stacks)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
---
