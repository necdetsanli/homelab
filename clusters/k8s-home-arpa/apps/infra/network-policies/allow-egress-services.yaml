# Per-namespace egress allow rules for service-specific traffic flows.
#
# These supplement allow-egress-core.yaml (DNS + API server). Each rule
# targets the minimum required endpoints, ports, and pod selectors.
#
# NOTE: argocd namespace egress policies (intra-ns, GitHub, Helm repos)
# live in bootstrap/10-argocd/ to avoid circular dependency.
#
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# cert-manager — Vault PKI + intra-namespace (webhook ↔ controller)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-intra-namespace
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - {}
---
# cert-manager controller issues certs via Vault PKI.
# Traffic: pod → HAProxy VIP (192.168.20.22:443) → Vault leader (:8200)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-vault
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: cert-manager
  egress:
    - toCIDR:
        - "192.168.20.22/32"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# security — VSO → Vault + intra-namespace
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-intra-namespace
  namespace: security
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - {}
---
# VSO syncs secrets from Vault via the same HAProxy VIP.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-vault
  namespace: security
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: vault-secrets-operator
  egress:
    - toCIDR:
        - "192.168.20.22/32"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# longhorn-system — intra-namespace + host/remote-node for data replication
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
---
# Longhorn manager ↔ instance-manager ↔ CSI plugin communication.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-intra-namespace
  namespace: longhorn-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - {}
---
# Longhorn data plane: instance-manager pods replicate volume data to
# other nodes. CSI plugin registers with kubelet (host). Backup engine
# ships snapshots to NFS target (192.168.20.50 — TrueNAS).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-longhorn-data
  namespace: longhorn-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector: {}
  egress:
    - toEntities:
        - host
        - remote-node
    - toCIDR:
        - "192.168.20.50/32"
      toPorts:
        - ports:
            - port: "2049"
              protocol: TCP
---
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# kube-system — intra-namespace + host/remote-node
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
---
# Hubble UI → Hubble Relay, CoreDNS → upstream forwarders, etc.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-intra-namespace
  namespace: kube-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - {}
---
# metrics-server → kubelet (host), CoreDNS → upstream DNS (host network),
# Hubble relay → cilium-agent gRPC (host network on each node).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-host
  namespace: kube-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector: {}
  egress:
    - toEntities:
        - host
        - remote-node
---
# CoreDNS forwards queries to upstream resolvers (router, external DNS).
# These are "world" entities — not host or remote-node — so they need
# a separate rule. Restricted to kube-dns pods and port 53 only.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-coredns-upstream
  namespace: kube-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector:
    matchLabels:
      k8s-app: kube-dns
  egress:
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
---
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# cilium-spire — intra-namespace
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
---
# SPIRE server ↔ SPIRE agent communication within the namespace.
# Agent → Server is also covered by allow-spire.yaml ingress rule.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-intra-namespace
  namespace: cilium-spire
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - {}
---
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# gateway-system — intra-namespace
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
---
# Gateway controller and future pods within the namespace.
# Cilium embedded Envoy runs with hostNetwork (exempt from NetworkPolicy),
# so this primarily covers the Gateway API controller pod.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-intra-namespace
  namespace: gateway-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - {}
---
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# monitoring + logging — intra-namespace only (extend when deploying stacks)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
---
# TODO: When deploying Prometheus, add egress to scrape targets:
#   - toEntities: [host, remote-node]  for node-exporter
#   - toEndpoints across namespaces for service monitors
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-intra-namespace
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - {}
---
# Grafana -> Mimir (monitoring), Loki (logging), Tempo (tracing), Jaeger (tracing), ES (logging)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-grafana-datasources
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  egress:
    # Loki gateway in logging namespace
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: logging
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
            - port: "9200"
              protocol: TCP
    # Tempo (query-frontend :3200) + Jaeger (query UI :16686) in tracing namespace
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: tracing
      toPorts:
        - ports:
            - port: "3200"
              protocol: TCP
            - port: "16686"
              protocol: TCP
---
# TODO: When deploying Loki/Fluentd, add egress for log collection.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-intra-namespace
  namespace: logging
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - {}
---
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# tracing — intra-namespace (Tempo + Jaeger inter-pod)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-intra-namespace
  namespace: tracing
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - {}
---
# Tempo metrics generator -> Mimir (remote write)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-tempo-mimir
  namespace: tracing
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: tempo
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
---
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# opentelemetry — intra-namespace + cross-namespace exports + host metrics
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-intra-namespace
  namespace: opentelemetry
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - {}
---
# OTel Collector needs host access for hostmetrics receiver
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-host
  namespace: opentelemetry
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector: {}
  egress:
    - toEntities:
        - host
        - remote-node
---
# OTel Collector -> Mimir (monitoring:80), Loki (logging:80), Tempo (tracing:4317), Jaeger (tracing:4317)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-otel-backends
  namespace: opentelemetry
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector: {}
  egress:
    # Mimir gateway in monitoring namespace
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
    # Loki gateway in logging namespace
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: logging
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
    # Tempo + Jaeger OTLP gRPC in tracing namespace
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: tracing
      toPorts:
        - ports:
            - port: "4317"
              protocol: TCP
---
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# elastic-system — intra-namespace + cross-namespace to logging (ES management)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-intra-namespace
  namespace: elastic-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - {}
---
# ECK operator manages Elasticsearch + Kibana in logging namespace
apiVersion: cilium.io/v2
