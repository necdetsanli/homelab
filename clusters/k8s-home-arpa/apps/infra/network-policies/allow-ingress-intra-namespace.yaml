# Allow ingress from pods within the same namespace.
#
# This is the ingress counterpart to the allow-egress-intra-namespace
# rules in allow-egress-services.yaml.  Without these, the Kubernetes
# default-deny NetworkPolicy blocks all ingress and pods (e.g.
# argocd-application-controller → argocd-repo-server) cannot communicate
# even though egress is permitted.
#
# Pattern: one CiliumNetworkPolicy per managed namespace, sync-wave -1.
# NOTE: argocd namespace ingress lives in bootstrap/10-argocd/.
---
# ── cert-manager ────────────────────────────────────────────────────────────
# webhook ↔ controller, cainjector ↔ controller
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-ingress-intra-namespace
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - {}
---
# ── security ────────────────────────────────────────────────────────────────
apiVersion: cilium.io/v2
