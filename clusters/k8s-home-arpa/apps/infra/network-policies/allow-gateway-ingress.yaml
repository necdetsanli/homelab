# Allow Cilium Gateway API proxy (Envoy) to reach backend services.
#
# Embedded Envoy (inside cilium-agent) uses the reserved:ingress identity
# when use-original-source-address is false (default for Gateway API).
# Each service exposed via an HTTPRoute needs an explicit ingress policy
# allowing traffic from the ingress entity on the service port.
#
# This is the enterprise-grade pattern: one policy per exposed service,
# minimal port surface, co-located in the central network-policies
# directory for audit visibility.
---
# Longhorn UI: allow Gateway proxy to reach longhorn-frontend on port 8000
# (Service port is 80, but target port is 8000 on the pod)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-gateway-to-longhorn-ui
  namespace: longhorn-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector:
    matchLabels:
      app: longhorn-ui
  ingress:
    - fromEntities:
        - ingress
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
---
# Hubble UI: allow Gateway proxy to reach hubble-ui on port 8081
# (Service port is 80, but target port is 8081 on the nginx frontend container)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-gateway-to-hubble-ui
  namespace: kube-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  endpointSelector:
    matchLabels:
      k8s-app: hubble-ui
  ingress:
    - fromEntities:
        - ingress
      toPorts:
        - ports:
            - port: "8081"
              protocol: TCP
