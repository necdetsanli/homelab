# LimitRanges — per-namespace default resource requests/limits.
#
# Prevents pods without resource specs from consuming unbounded resources.
# Every container gets default requests/limits automatically via LimitRange
# admission controller.  The "max" field rejects pods that exceed the cap.
#
# Values are tuned for a 3-node homelab cluster:
#   - master: ~16GB RAM, ~8 CPU (shared with control plane)
#   - worker-1, worker-2: ~32GB RAM, ~16 CPU each
#
# Adjust after reviewing actual resource consumption:
#   kubectl top pods -A --sort-by=memory | head -20
#
# NOTE: These LimitRanges apply to ALL pods in the namespace, including
# those deployed by Helm charts that already set resources. Helm-set
# values take precedence over LimitRange defaults — the defaults only
# apply to containers without explicit resource specs.
---
# ── monitoring ──────────────────────────────────────────────────────────────
# Grafana, Mimir (multi-component), Zabbix (server + web + agent + postgres)
# Highest resource density namespace — generous limits.
apiVersion: v1
kind: LimitRange
metadata:
  name: default-limits
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 50m
        memory: 64Mi
      max:
        cpu: "4"
        memory: 4Gi
    - type: Pod
      max:
        cpu: "8"
        memory: 8Gi
---
