# Elasticsearch cluster managed by ECK Operator.
# 2-node HA deployment with anti-affinity (1 per worker node).
# ECK auto-generates 'elastic' user credentials in Secret: homelab-es-elastic-user
# Service endpoint: homelab-es-http.logging.svc:9200
---
apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: homelab
  namespace: logging
spec:
  version: 8.16.0
  # Use Vault PKI cert instead of ECK self-signed CA.
  # cert-manager issues the cert via ClusterIssuer "vault-pki".
  # This allows all clients (Grafana, Jaeger) to trust the same Vault root CA.
  http:
    tls:
      certificate:
        secretName: elasticsearch-tls
  nodeSets:
    - name: default
      count: 2
      config:
        # Disable mmap to comply with PSA restricted (no sysctl required)
        node.store.allow_mmap: false
        # ECK handles discovery automatically for multi-node clusters.
        # Do NOT set discovery.type: single-node — it conflicts with
        # cluster.initial_master_nodes that ECK injects automatically.
        # Disable machine learning (saves ~200MB RAM)
        xpack.ml.enabled: false
      podTemplate:
        spec:
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      elasticsearch.k8s.elastic.co/cluster-name: homelab
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: elasticsearch
              resources:
                requests:
                  cpu: 500m
                  memory: 1Gi
                limits:
                  cpu: 2
                  memory: 2Gi
              env:
                - name: ES_JAVA_OPTS
                  value: "-Xms1g -Xmx1g"
          # Elasticsearch needs writable data directory
          securityContext:
            fsGroup: 1000
            runAsUser: 1000
            runAsGroup: 1000
      volumeClaimTemplates:
        - metadata:
            name: elasticsearch-data
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 20Gi
            storageClassName: longhorn
