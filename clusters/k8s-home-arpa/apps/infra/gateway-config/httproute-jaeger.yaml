# HTTPRoute: jaeger.mgmt.home.arpa -> Jaeger query UI in tracing
# HAProxy terminates external TLS (Vault ACME cert) and re-encrypts to the
# Gateway's HTTPS listener (Vault PKI cert via cert-manager). This route
# matches by hostname and forwards to the Jaeger all-in-one query port.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jaeger-ui
  namespace: tracing
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: platform-gateway
      namespace: gateway-system
      sectionName: https
  hostnames:
    - "jaeger.mgmt.home.arpa"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: jaeger-all-in-one
          port: 16686
          weight: 1
