# HTTPRoute: grafana.mgmt.home.arpa -> grafana service in monitoring
# HAProxy terminates external TLS (Vault ACME cert) and re-encrypts to the
# Gateway's HTTPS listener (Vault PKI cert via cert-manager). This route
# matches by hostname and forwards to the Grafana service.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: platform-gateway
      namespace: gateway-system
      sectionName: https
  hostnames:
    - "grafana.mgmt.home.arpa"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: grafana
          port: 80
          weight: 1
