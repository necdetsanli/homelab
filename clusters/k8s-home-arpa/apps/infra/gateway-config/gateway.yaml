# Shared platform Gateway — single Cilium LB-IPAM VIP for all K8s services.
# HAProxy terminates external TLS (Vault ACME) and re-encrypts to this Gateway.
# The HTTPS listener presents a Vault PKI cert issued by cert-manager.
# Individual HTTPRoutes per service handle hostname-based routing.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: platform-gateway
  namespace: gateway-system
spec:
  gatewayClassName: cilium
  # Static VIP from CiliumLoadBalancerIPPool (homelab-pool: 192.168.20.200-250)
  addresses:
    - type: IPAddress
      value: "192.168.20.201"
  listeners:
    # HTTPS — primary listener for HAProxy re-encryption
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - name: gateway-tls
      allowedRoutes:
        namespaces:
          from: All
    # HTTP — kept for health checks and future HTTP→HTTPS redirect
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
