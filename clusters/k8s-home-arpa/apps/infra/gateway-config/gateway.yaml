# Shared platform Gateway — single Cilium LB-IPAM VIP for all HTTP services.
# HAProxy terminates external TLS, forwards plain HTTP to this Gateway.
# Individual HTTPRoutes per service handle hostname-based routing.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: platform-gateway
  namespace: gateway-system
spec:
  gatewayClassName: cilium
  # Static VIP from CiliumLoadBalancerIPPool (homelab-pool: 192.168.20.200-250)
  addresses:
    - type: IPAddress
      value: "192.168.20.201"
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
