# HTTPRoute: kibana.mgmt.home.arpa -> Kibana service in logging
# HAProxy terminates external TLS (Vault ACME cert) and re-encrypts to the
# Gateway's HTTPS listener (Vault PKI cert via cert-manager). This route
# matches by hostname and forwards to the ECK-managed Kibana service.
# Note: Kibana requires the kb-http service (port 5601), which ECK creates
# automatically with name: homelab-kb-http.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kibana
  namespace: logging
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: platform-gateway
      namespace: gateway-system
      sectionName: https
  hostnames:
    - "kibana.mgmt.home.arpa"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: homelab-kb-http
          port: 5601
          weight: 1
