# HTTPRoute: hubble.mgmt.home.arpa -> hubble-ui in kube-system
# HAProxy terminates external TLS (Vault ACME cert) and re-encrypts to the
# Gateway's HTTPS listener (Vault PKI cert via cert-manager). This route
# matches by hostname and forwards to the Hubble UI service.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hubble-ui
  namespace: kube-system
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: platform-gateway
      namespace: gateway-system
      sectionName: https
  hostnames:
    - "hubble.mgmt.home.arpa"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: hubble-ui
          port: 80
          weight: 1
