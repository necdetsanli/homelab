apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  description: "Platform components for k8s-home-arpa (strict allow-list)"

  # Drift detection: warn when un-tracked resources appear in managed namespaces
  orphanedResources:
    warn: true

  # Sync windows: auto-sync allowed only during maintenance window (UTC)
  # Manual syncs are always permitted regardless of window.
  syncWindows:
    # Allow auto-sync daily during maintenance window (00:00-06:00 UTC)
    # Manual syncs are always permitted regardless of window.
    - kind: allow
      schedule: "0 0 * * *"
      duration: 6h
      applications:
        - "*"
      manualSync: true

  sourceRepos:
    - "https://github.com/necdetsanli/homelab.git"
    - "https://charts.jetstack.io"
    - "https://helm.releases.hashicorp.com"
    - "https://charts.longhorn.io"
    # Observability stack
    - "https://grafana.github.io/helm-charts"
    - "https://zabbix-community.github.io/helm-zabbix"
    - "https://helm.elastic.co"
    - "https://open-telemetry.github.io/opentelemetry-helm-charts"
    - "https://jaegertracing.github.io/helm-charts"
    - "https://kubernetes-sigs.github.io/nfs-subdir-external-provisioner"

  destinations:
    - server: "https://kubernetes.default.svc"
      namespace: "cert-manager"
    - server: "https://kubernetes.default.svc"
      namespace: "monitoring"
    - server: "https://kubernetes.default.svc"
      namespace: "logging"
    - server: "https://kubernetes.default.svc"
      namespace: "security"
    - server: "https://kubernetes.default.svc"
      namespace: "longhorn-system"
    - server: "https://kubernetes.default.svc"
      namespace: "gateway-system"
    - server: "https://kubernetes.default.svc"
      namespace: "argocd"
    # cert-manager needs leader election Roles/RoleBindings in kube-system
    - server: "https://kubernetes.default.svc"
      namespace: "kube-system"
    # SPIRE server + agent for Cilium mutual authentication
    - server: "https://kubernetes.default.svc"
      namespace: "cilium-spire"
    # Observability stack
    - server: "https://kubernetes.default.svc"
      namespace: "tracing"
    - server: "https://kubernetes.default.svc"
      namespace: "opentelemetry"
    - server: "https://kubernetes.default.svc"
      namespace: "elastic-system"
    - server: "https://kubernetes.default.svc"
      namespace: "nfs-storage"

  # Cluster-scoped resources: strict allow-list
  clusterResourceWhitelist:
    - group: ""
      kind: "Namespace"
    - group: "apiextensions.k8s.io"
      kind: "CustomResourceDefinition"
    - group: "rbac.authorization.k8s.io"
      kind: "ClusterRole"
    - group: "rbac.authorization.k8s.io"
      kind: "ClusterRoleBinding"
    - group: "admissionregistration.k8s.io"
      kind: "MutatingWebhookConfiguration"
    - group: "admissionregistration.k8s.io"
      kind: "ValidatingWebhookConfiguration"
    - group: "cert-manager.io"
      kind: "ClusterIssuer"
    - group: "networking.k8s.io"
      kind: "IngressClass"
    # Gateway API (cluster-scoped)
    - group: "gateway.networking.k8s.io"
      kind: "GatewayClass"
    # Longhorn storage (cluster-scoped)
    - group: "storage.k8s.io"
      kind: "StorageClass"
    - group: "storage.k8s.io"
      kind: "CSIDriver"
    - group: ""
      kind: "PersistentVolume"
    # Longhorn PriorityClass (cluster-scoped)
    - group: "scheduling.k8s.io"
      kind: "PriorityClass"
    # Cilium BGP Control Plane (cluster-scoped)
    - group: "cilium.io"
      kind: "CiliumBGPClusterConfig"
    - group: "cilium.io"
      kind: "CiliumBGPPeerConfig"
    - group: "cilium.io"
      kind: "CiliumBGPAdvertisement"
    - group: "cilium.io"
      kind: "CiliumBGPNodeConfigOverride"
    # Cilium LB-IPAM (cluster-scoped)
    - group: "cilium.io"
      kind: "CiliumLoadBalancerIPPool"
    - group: "cilium.io"
      kind: "CiliumL2AnnouncementPolicy"
    # VSO (Vault Secrets Operator) cluster-scoped CRDs
    - group: "secrets.hashicorp.com"
      kind: "VaultAuthGlobal"
    # ECK CRDs (cluster-scoped)
    - group: "maps.k8s.elastic.co"
      kind: "ElasticMapsServer"
    # OpenTelemetry CRDs (cluster-scoped)
    - group: "opentelemetry.io"
      kind: "Instrumentation"

  # Namespaced resources: strict allow-list
  namespaceResourceWhitelist:
    - group: ""
      kind: "ConfigMap"
    - group: ""
      kind: "Secret"
    - group: ""
      kind: "Service"
    - group: ""
      kind: "ServiceAccount"
    - group: ""
      kind: "Endpoints"
    - group: ""
      kind: "LimitRange"
    - group: ""
      kind: "PersistentVolumeClaim"
    - group: "apps"
      kind: "Deployment"
    - group: "apps"
      kind: "StatefulSet"
    - group: "apps"
      kind: "DaemonSet"
    - group: "batch"
      kind: "Job"
    - group: "batch"
      kind: "CronJob"
    - group: "rbac.authorization.k8s.io"
      kind: "Role"
    - group: "rbac.authorization.k8s.io"
      kind: "RoleBinding"
    - group: "networking.k8s.io"
      kind: "Ingress"
    - group: "networking.k8s.io"
      kind: "NetworkPolicy"
    # Gateway API (namespaced)
    - group: "gateway.networking.k8s.io"
      kind: "Gateway"
    - group: "gateway.networking.k8s.io"
      kind: "HTTPRoute"
    - group: "gateway.networking.k8s.io"
      kind: "GRPCRoute"
    - group: "gateway.networking.k8s.io"
      kind: "ReferenceGrant"
    # Cilium-native network policies (enterprise-grade: fromEntities support)
    - group: "cilium.io"
      kind: "CiliumNetworkPolicy"
    - group: "policy"
      kind: "PodDisruptionBudget"
    - group: "autoscaling"
      kind: "HorizontalPodAutoscaler"
    # Allow Argo CD objects only inside argocd namespace (where they live)
    - group: "argoproj.io"
      kind: "Application"
    - group: "argoproj.io"
      kind: "AppProject"
    - group: "argoproj.io"
      kind: "ApplicationSet"
    # cert-manager namespaced resources
    - group: "cert-manager.io"
      kind: "Certificate"
    - group: "cert-manager.io"
      kind: "Issuer"
    # VSO (Vault Secrets Operator) namespaced resources
    - group: "secrets.hashicorp.com"
      kind: "VaultConnection"
    - group: "secrets.hashicorp.com"
      kind: "VaultAuth"
    - group: "secrets.hashicorp.com"
      kind: "VaultStaticSecret"
    - group: "secrets.hashicorp.com"
      kind: "VaultDynamicSecret"
    - group: "secrets.hashicorp.com"
      kind: "VaultPKISecret"
    - group: "secrets.hashicorp.com"
      kind: "HCPAuth"
    - group: "secrets.hashicorp.com"
      kind: "HCPVaultSecretsApp"
    # ECK managed resources
    - group: "elasticsearch.k8s.elastic.co"
      kind: "Elasticsearch"
    - group: "kibana.k8s.elastic.co"
      kind: "Kibana"
    # OpenTelemetry managed resources
    - group: "opentelemetry.io"
      kind: "OpenTelemetryCollector"
    - group: "opentelemetry.io"
      kind: "Instrumentation"