# ----------------------------------------------------------
# RKE2 Cilium HelmChartConfig — MANAGED BY RANCHER
# ----------------------------------------------------------
# This file is a reference copy only.
# Source of truth: Rancher UI → Cluster Management → k8s-home-arpa
# Detailed docs:  infrastructure/rancher/cilium-values.yaml
# ----------------------------------------------------------
# Base chart: rancher/rke2-cilium (Cilium v1.19.0)
# Cluster:    k8s-home-arpa (RKE2 v1.34.4+rke2r1)
# ----------------------------------------------------------
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: rke2-cilium
  namespace: kube-system
spec:
  valuesContent: |-
    # Transparent Encryption (WireGuard)
    encryption:
      enabled: true
      type: wireguard
      nodeEncryption: true
      wireguard:
        userspaceFallback: false

    # Mutual Authentication (SPIRE)
    authentication:
      enabled: true
      mutual:
        spire:
          enabled: true
          trustDomain: spire.cilium
          install:
            enabled: true
            namespace: cilium-spire
            existingNamespace: true
            server:
              replicas: 1
              dataStorage:
                enabled: true
                storageClass: longhorn
                accessMode: ReadWriteOnce
                size: 1Gi
            agent:
              skipKubeletVerification: true
              tolerations:
                - effect: NoSchedule
                  key: node.kubernetes.io/not-ready
                - effect: NoSchedule
                  key: node-role.kubernetes.io/master
                - effect: NoSchedule
                  key: node-role.kubernetes.io/control-plane
                - effect: NoSchedule
                  key: node.cloudprovider.kubernetes.io/uninitialized
                  value: "true"
                - key: CriticalAddonsOnly
                  operator: Exists
                - effect: NoSchedule
                  key: node-role.kubernetes.io/etcd
                  operator: Exists

    # Core Networking
    routingMode: native
    ipv4NativeRoutingCIDR: "10.42.0.0/16"
    autoDirectNodeRoutes: true
    enableIPv4Masquerade: true
    kubeProxyReplacement: "true"
    k8sServiceHost: localhost
    k8sServicePort: "6443"

    # Cluster Identity
    cluster:
      id: 1
      name: k8s-home-arpa

    # eBPF Datapath
    bpf:
      masquerade: true
      tproxy: true
      hostLegacyRouting: false    # BPF host routing (required for BBR)

    # Socket-Level LB
    socketLB:
      enabled: true

    # Bandwidth Management
    bandwidthManager:
      enabled: true
      bbr: true

    # LB-IPAM + L2 (replaces MetalLB)
    enableLBIPAM: true
    l2announcements:
      enabled: true
    l2NeighDiscovery:
      enabled: true

    # BGP Control Plane
    bgpControlPlane:
      enabled: true

    # Gateway API
    gatewayAPI:
      enabled: true
      enableAlpn: true
      enableAppProtocol: true
      xffNumTrustedHops: 1
    envoyConfig:
      enabled: true

    # Observability: Prometheus
    prometheus:
      enabled: true
      controllerGroupMetrics:
        - write-cni-file
        - sync-host-ips
        - sync-lb-maps-with-k8s-services

    # Observability: Hubble
    hubble:
      enabled: true
      dropEventEmitter:
        enabled: true
        interval: 2m
        reasons:
          - auth_required
          - policy_denied
      metrics:
        enabled:
          - dns
          - drop
          - tcp
          - flow
          - port-distribution
          - icmp
          - "httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction"
        enableOpenMetrics: true
        dashboards:
          enabled: true
      relay:
        enabled: true
      ui:
        enabled: true

    # Grafana Dashboards
    dashboards:
      enabled: true
    operator:
      replicas: 2
      dashboards:
        enabled: true
      podDisruptionBudget:
        enabled: true
        maxUnavailable: 1
