# Mimir push endpoint for bare-metal Grafana Alloy agents.
# Exposes mimir-nginx (gateway) on a Cilium LB-IPAM VIP so hosts
# outside the cluster can push metrics via Prometheus remote_write.
#
# Traffic flow:
#   Alloy (bare-metal) → 192.168.20.203:80 → mimir-nginx pod :8080
---
apiVersion: v1
kind: Service
metadata:
  name: mimir-push-lb
  namespace: monitoring
  annotations:
    lbipam.cilium.io/ips: "192.168.20.203"
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: mimir
    app.kubernetes.io/component: nginx
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
