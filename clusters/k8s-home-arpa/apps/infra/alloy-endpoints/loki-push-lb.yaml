# Loki push endpoint for bare-metal Grafana Alloy agents.
# Exposes loki-gateway on a Cilium LB-IPAM VIP so hosts outside
# the cluster can push logs via /loki/api/v1/push.
#
# Traffic flow:
#   Alloy (bare-metal) → 192.168.20.202:80 → loki-gateway pod :8080
---
apiVersion: v1
kind: Service
metadata:
  name: loki-push-lb
  namespace: logging
  annotations:
    lbipam.cilium.io/ips: "192.168.20.202"
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: loki
    app.kubernetes.io/component: gateway
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
