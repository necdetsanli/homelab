# Cilium LB-IPAM IP Pool — replaces MetalLB IPAddressPool
# Cilium operator allocates LoadBalancer VIPs from this range.
# Works with l2announcements.enabled: true to handle ARP responses.
apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: homelab-pool
spec:
  blocks:
    - start: "192.168.20.200"
      stop: "192.168.20.250"
