# Mimir — long-term metrics storage backend for the LGTM stack.
# Deployed as single-replica distributed (all components × 1 pod).
# Receives metrics from OpenTelemetry Collector via OTLP.
# Grafana queries Mimir via the nginx gateway at /prometheus endpoint.
# Embedded MinIO provides S3-compatible object storage on NFS.
#
# NOTE: mimir-distributed chart has no monolithic mode. Using 5.5.1 with
# 1 replica per component for minimal homelab footprint.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mimir
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: "https://grafana.github.io/helm-charts"
    chart: mimir-distributed
    targetRevision: 5.5.1
    helm:
      releaseName: mimir
      valuesObject:
        # Mimir config — single-replica distributed mode.
        # Chart 5.5.1 does NOT support monolithic mode (no deploymentMode key).
        # We run 1 replica of each required component for homelab efficiency.
        mimir:
          structuredConfig:
            multitenancy_enabled: false
            limits:
              max_global_series_per_user: 500000
              ingestion_rate: 10000
        # Embedded MinIO for S3-compatible object storage (required by Mimir)
        minio:
          enabled: true
          persistence:
            storageClass: nfs
        # Nginx reverse-proxy — single API endpoint for Grafana + OTel.
        # resolver must be the CoreDNS ClusterIP; default hostname fails
        # because nginx resolves at startup before kube-dns is reachable.
        nginx:
          enabled: true
          replicas: 1
          nginxConfig:
            resolver: "10.43.0.10"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
        # Single-replica distributed components
        ingester:
          replicas: 1
          zoneAwareReplication:
            enabled: false
          persistentVolume:
            storageClass: nfs
        distributor:
          replicas: 1
        querier:
          replicas: 1
        query_frontend:
          replicas: 1
        compactor:
          replicas: 1
          persistentVolume:
            storageClass: nfs
        store_gateway:
          replicas: 1
          zoneAwareReplication:
            enabled: false
          persistentVolume:
            storageClass: nfs
        # Optional components — disabled for homelab
        query_scheduler:
          enabled: false
        overrides_exporter:
          replicas: 0
        ruler:
          replicas: 0
        alertmanager:
          replicas: 0
  ignoreDifferences:
    # Kubernetes mutates 0-replica StatefulSets (alertmanager, ruler) by
    # injecting persistentVolumeClaimRetentionPolicy. This is cosmetic.
    - group: apps
      kind: StatefulSet
      name: mimir-alertmanager
      jsonPointers:
        - /spec/persistentVolumeClaimRetentionPolicy
  destination:
    server: "https://kubernetes.default.svc"
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
      - RespectIgnoreDifferences=true
