# Mimir — long-term metrics storage backend for the LGTM stack.
# Deployed as HA distributed (critical data-path components × 2 pods).
# Receives metrics from OpenTelemetry Collector via OTLP.
# Grafana queries Mimir via the nginx gateway at /prometheus endpoint.
# Embedded MinIO provides S3-compatible object storage on NFS.
#
# NOTE: mimir-distributed chart has no monolithic mode. Using 5.5.1 with
# critical components at 2 replicas for HA; others at 1 for efficiency.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mimir
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: "https://grafana.github.io/helm-charts"
    chart: mimir-distributed
    targetRevision: 5.5.1
    helm:
      releaseName: mimir
      valuesObject:
        # Mimir config — HA distributed mode.
        # Chart 5.5.1 does NOT support monolithic mode (no deploymentMode key).
        # Critical data-path components run 2 replicas; others run 1.
        mimir:
          structuredConfig:
            multitenancy_enabled: false
            limits:
              max_global_series_per_user: 500000
              ingestion_rate: 10000
        # Embedded MinIO for S3-compatible object storage (required by Mimir)
        minio:
          enabled: true
          persistence:
            storageClass: nfs
        # Nginx reverse-proxy — single API endpoint for Grafana + OTel.
        # resolver must be the CoreDNS ClusterIP; default hostname fails
        # because nginx resolves at startup before kube-dns is reachable.
        # HA: critical data-path components run 2 replicas with anti-affinity.
        # replication_factor stays at 1 (set by chart when zoneAware=false) —
        # the ring distributes series across ingesters for availability.
        # With 2 workers this avoids quorum issues during single-node failure.
        nginx:
          enabled: true
          replicas: 2
          nginxConfig:
            resolver: "10.43.0.10"
          # Chart template uses tpl() on nginx.affinity — must be a string, not a map.
          affinity: |
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/instance: mimir
                        app.kubernetes.io/component: nginx
                    topologyKey: kubernetes.io/hostname
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
        ingester:
          replicas: 2
          zoneAwareReplication:
            enabled: false
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/instance: mimir
                        app.kubernetes.io/component: ingester
                    topologyKey: kubernetes.io/hostname
          persistentVolume:
            storageClass: nfs
        distributor:
          replicas: 2
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/instance: mimir
                        app.kubernetes.io/component: distributor
                    topologyKey: kubernetes.io/hostname
        querier:
          replicas: 2
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/instance: mimir
                        app.kubernetes.io/component: querier
                    topologyKey: kubernetes.io/hostname
        query_frontend:
          replicas: 2
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/instance: mimir
                        app.kubernetes.io/component: query-frontend
                    topologyKey: kubernetes.io/hostname
        compactor:
          replicas: 1
          persistentVolume:
            storageClass: nfs
        store_gateway:
          replicas: 1
          zoneAwareReplication:
            enabled: false
          persistentVolume:
            storageClass: nfs
        # Optional components
        query_scheduler:
          enabled: false
        overrides_exporter:
          replicas: 0
        # Ruler — evaluates recording & alerting rules against stored metrics.
        # Pushes firing alerts to alertmanager for routing/notification.
        ruler:
          replicas: 1
        # Alertmanager — deduplicates, groups, and routes alerts from ruler.
        # Configure receivers (Slack, email, PagerDuty) via alertmanager config.
        alertmanager:
          replicas: 1
          persistentVolume:
            storageClass: nfs
  destination:
    server: "https://kubernetes.default.svc"
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
