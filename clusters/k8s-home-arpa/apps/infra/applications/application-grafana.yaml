# Grafana — unified observability dashboard for LGTM stack.
# Pre-configured datasources: Mimir (metrics), Loki (logs), Tempo (traces),
# Jaeger (traces), Elasticsearch (log analytics).
# Exposed via Gateway API at grafana.mgmt.home.arpa.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: "https://grafana.github.io/helm-charts"
    chart: grafana
    targetRevision: 10.5.15
    helm:
      releaseName: grafana
      valuesObject:
        # Admin credentials sourced from Vault via VSO.
        # Secret "grafana-admin-credentials" is created by VaultStaticSecret
        # in vso-config/ (synced from Vault KV v2 path: secret/monitoring/grafana).
        admin:
          existingSecret: grafana-admin-credentials
          userKey: admin-user
          passwordKey: admin-password
        persistence:
          enabled: true
          size: 5Gi
          storageClassName: nfs
        # Pre-configured datasources for the full observability stack
        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
              - name: Mimir
                type: prometheus
                url: http://mimir-gateway.monitoring.svc.cluster.local:80/prometheus
                access: proxy
                isDefault: true
              - name: Loki
                type: loki
                url: http://loki-gateway.logging.svc.cluster.local:80
                access: proxy
              - name: Tempo
                type: tempo
                url: http://tempo.tracing.svc.cluster.local:3200
                access: proxy
                jsonData:
                  tracesToLogsV2:
                    datasourceUid: loki
                  tracesToMetrics:
                    datasourceUid: mimir
                  nodeGraph:
                    enabled: true
                  serviceMap:
                    datasourceUid: mimir
              - name: Jaeger
                type: jaeger
                url: http://jaeger.tracing.svc.cluster.local:16686
                access: proxy
              - name: Elasticsearch
                type: elasticsearch
                url: https://homelab-es-http.logging.svc.cluster.local:9200
                access: proxy
                basicAuth: true
                basicAuthUser: elastic
                jsonData:
                  timeField: "@timestamp"
                  tlsCACert: $__file{/etc/grafana/secrets/vault-ca-bundle/ca.crt}
                secureJsonData:
                  # ECK auto-generates 'elastic' user password in Secret:
                  # homelab-es-elastic-user (logging namespace).
                  # TODO: Sync ES credentials via VSO for fully automated rotation.
                  basicAuthPassword: ""
        # Mount Vault root CA for TLS verification of Elasticsearch datasource.
        # The vault-ca-bundle Secret is created by the vault-ca-bundle Application
        # (kustomize overlay → monitoring namespace).
        extraSecretMounts:
          - name: vault-ca-bundle
            secretName: vault-ca-bundle
            mountPath: /etc/grafana/secrets/vault-ca-bundle
            readOnly: true
        # Homelab-sized resource limits
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        # PSA restricted compliance
        securityContext:
          runAsNonRoot: true
          runAsUser: 472
          runAsGroup: 472
          fsGroup: 472
          seccompProfile:
            type: RuntimeDefault
        containerSecurityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
  destination:
    server: "https://kubernetes.default.svc"
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
