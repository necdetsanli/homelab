# OpenTelemetry Collector — central telemetry pipeline.
# Deployed at sync-wave 4 to ensure OTel Operator CRDs exist first.
# DaemonSet mode: one collector per node for host metrics + OTLP ingestion.
# Routes: metrics -> Mimir, logs -> Loki, traces -> Tempo + Jaeger.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-collector
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: platform
  source:
    repoURL: "https://github.com/necdetsanli/homelab.git"
    targetRevision: "main"
    path: clusters/k8s-home-arpa/apps/infra/otel-config
  destination:
    server: "https://kubernetes.default.svc"
    namespace: opentelemetry
  # OTel Operator mutates collector CR with defaults
  ignoreDifferences:
    - group: opentelemetry.io
      kind: OpenTelemetryCollector
      jsonPointers:
        - /metadata/annotations
        - /spec/replicas
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
      - RespectIgnoreDifferences=true
