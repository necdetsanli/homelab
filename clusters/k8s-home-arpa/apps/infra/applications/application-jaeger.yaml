# Jaeger — distributed tracing UI and collector.
# All-in-one mode: collector + query + agent in a single pod.
# Receives traces from OpenTelemetry Collector via OTLP (port 4317).
# In-memory storage for homelab; upgrade to ES backend for persistence.
# Exposed via Gateway API at jaeger.mgmt.home.arpa.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jaeger
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: platform
  source:
    repoURL: "https://jaegertracing.github.io/helm-charts"
    chart: jaeger
    targetRevision: 4.4.6
    helm:
      releaseName: jaeger
      valuesObject:
        # Jaeger v2 (chart 4.x) — unified All-In-One binary built on the
        # OTEL Collector framework. In-memory storage is the default;
        # traces are lost on pod restart.  For persistence, configure an
        # ES backend via config.extensions.jaeger_storage.
        #
        # The unified Service exposes: Query UI (16686), OTLP (4317/4318),
        # Jaeger (14250/14268), Zipkin (9411).
        jaeger:
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
  destination:
    server: "https://kubernetes.default.svc"
    namespace: tracing
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
