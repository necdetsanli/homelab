# Zabbix — infrastructure monitoring (SNMP, agent-based, IPMI).
# Complements LGTM (application-level) with network/hardware monitoring.
# Includes: server, web UI, agent, embedded PostgreSQL.
# Exposed via Gateway API at zabbix.mgmt.home.arpa.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zabbix
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: platform
  source:
    repoURL: "https://zabbix-community.github.io/helm-zabbix"
    chart: zabbix
    targetRevision: 7.0.12
    helm:
      releaseName: zabbix
      valuesObject:
        # Override chart-generated names for clean service names
        fullnameOverride: zabbix
        zabbixServer:
          enabled: true
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
        zabbixWeb:
          enabled: true
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
        # In 7.x the key is zabbixAgent (default image is zabbix-agent2).
        # Runs as a sidecar in the zabbix-server pod.
        zabbixAgent:
          enabled: true
          runAsSidecar: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
        # Embedded PostgreSQL for Zabbix data.
        # 7.x uses storageSize (not size) and relies on the cluster
        # default StorageClass (longhorn).
        postgresql:
          enabled: true
          persistence:
            enabled: true
            storageSize: 10Gi
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
  destination:
    server: "https://kubernetes.default.svc"
    namespace: monitoring
  ignoreDifferences:
    # API server injects volumeMode + status into VolumeClaimTemplates.
    # These cause permanent OutOfSync with SSA because the Helm chart
    # doesn't include them and StatefulSet VCT is immutable.
    # Ignore the entire VCT array — individual field ignores aren't
    # sufficient for SSA sync-status calculation.
    - group: apps
      kind: StatefulSet
      name: zabbix-postgresql
      jqPathExpressions:
        - .spec.volumeClaimTemplates
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
      - RespectIgnoreDifferences=true
