# Zabbix — infrastructure monitoring (SNMP, agent-based, IPMI).
# Complements LGTM (application-level) with network/hardware monitoring.
# Includes: server, web UI, agent, embedded PostgreSQL.
# Exposed via Gateway API at zabbix.mgmt.home.arpa.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zabbix
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: "https://zabbix-community.github.io/helm-zabbix"
    chart: zabbix
    targetRevision: 7.0.12
    helm:
      releaseName: zabbix
      valuesObject:
        # Override chart-generated names for clean service names
        fullnameOverride: zabbix
        zabbixServer:
          enabled: true
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
        zabbixWeb:
          enabled: true
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
        # In 7.x the key is zabbixAgent (default image is zabbix-agent2).
        # DaemonSet mode: agent runs on every K8s node for host OS metrics
        # (CPU, disk, memory of the underlying VMs). hostNetwork exposes
        # the node's real IP; hostRootFsMount mounts / at /host/root for
        # filesystem monitoring. Replaces sidecar — the local agent on
        # the server's node handles that role automatically.
        #
        # Active checks (agent→server) enabled so agents self-register
        # and push data without the server needing agent IPs. This
        # eliminates the 127.0.0.1 problem on the auto-created
        # "Zabbix server" host. HostMetadata "K8sNode" is used by
        # auto-registration actions to assign templates/groups.
        zabbixAgent:
          enabled: true
          runAsSidecar: false
          runAsDaemonSet: true
          hostNetwork: true
          hostRootFsMount: true
          # Passive: accept checks from Zabbix Server pod (same cluster)
          ZBX_PASSIVE_ALLOW: true
          ZBX_SERVER_HOST: "zabbix-zabbix-server.monitoring.svc"
          # Active: agent pushes data to server (enables auto-registration).
          # ZBX_SERVER_HOST is auto-added to ServerActive by the entrypoint
          # when ZBX_ACTIVE_ALLOW=true — do NOT set ZBX_ACTIVESERVERS or
          # the address will be duplicated and agent2 will refuse to start.
          ZBX_ACTIVE_ALLOW: true
          extraEnv:
            - name: ZBX_HOSTNAMEITEM
              value: "system.hostname"
            - name: ZBX_METADATA
              value: "K8sNode"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
        # Embedded PostgreSQL for Zabbix data.
        # 7.x uses storageSize (not size) and relies on the cluster
        # default StorageClass (longhorn).
        postgresql:
          enabled: true
          persistence:
            enabled: true
            storageSize: 10Gi
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
  destination:
    server: "https://kubernetes.default.svc"
    namespace: monitoring
  ignoreDifferences:
    # API server injects volumeMode + status into VolumeClaimTemplates.
    # These cause permanent OutOfSync with SSA because the Helm chart
    # doesn't include them and StatefulSet VCT is immutable.
    # Ignore the entire VCT array — individual field ignores aren't
    # sufficient for SSA sync-status calculation.
    - group: apps
      kind: StatefulSet
      name: zabbix-postgresql
      jqPathExpressions:
        - .spec.volumeClaimTemplates
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
      - RespectIgnoreDifferences=true
