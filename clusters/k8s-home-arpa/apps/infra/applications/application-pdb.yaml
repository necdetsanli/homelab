# PodDisruptionBudgets — protect single-replica workloads during node drains.
# Ensures at least 1 replica of critical services remains available during
# RKE2 rolling upgrades (sequential drain strategy).
# Sync-wave 1: deploy alongside platform infrastructure.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pod-disruption-budgets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: "https://github.com/necdetsanli/homelab.git"
    targetRevision: main
    path: "clusters/k8s-home-arpa/apps/infra/pdb"
  destination:
    server: "https://kubernetes.default.svc"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
