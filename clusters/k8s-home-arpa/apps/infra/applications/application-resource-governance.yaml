# Resource Governance — LimitRanges for all managed namespaces.
# Prevents unbounded resource consumption by setting default requests/limits
# on containers that don't specify their own.
# Sync-wave 1: deploy alongside platform infrastructure.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: resource-governance
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: "https://github.com/necdetsanli/homelab.git"
    targetRevision: main
    path: "clusters/k8s-home-arpa/apps/infra/resource-governance"
  destination:
    server: "https://kubernetes.default.svc"
    # LimitRanges span multiple namespaces (set per-resource in YAML).
    # This default satisfies the AppProject destination requirement.
    namespace: "argocd"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
