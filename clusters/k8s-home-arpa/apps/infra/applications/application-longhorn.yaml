apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: platform
  source:
    repoURL: "https://charts.longhorn.io"
    chart: longhorn
    # Longhorn v1.11.0 — latest major release.
    # Hotfix images applied for known regressions:
    #   manager:          v1.11.0-hotfix-1 (webhook deadlock #12578)
    #   instance-manager: v1.11.0-hotfix-1 (proxy connection leak #12573)
    targetRevision: 1.11.0
    helm:
      releaseName: longhorn
      valuesObject:
        persistence:
          defaultClass: true
          defaultClassReplicaCount: 2
          reclaimPolicy: "Retain"
        defaultSettings:
          # 2 worker nodes — replica count must match
          defaultReplicaCount: 2
          # Allow overprovisioning (sum of PVC requests can exceed physical capacity)
          storageOverProvisioningPercentage: 100
          # Keep 15% disk free as safety margin
          storageMinimalAvailablePercentage: 15
        # v1.11.0 moved backup settings from defaultSettings to defaultBackupStore
        defaultBackupStore:
          # TrueNAS NFS backup target — off-cluster disaster recovery
          backupTarget: "nfs://192.168.20.50:/mnt/tank/backups/longhorn"
          backupTargetCredentialSecret: ""
        preUpgradeChecker:
          # Disable pre-upgrade hook -- causes SA-not-found on fresh install via ArgoCD
          jobEnabled: false
          # Skip upgrade version check — fresh install, no migration needed
          upgradeVersionCheck: false
        # Hotfix images — override default v1.11.0 tags with patched builds
        image:
          longhorn:
            manager:
              tag: v1.11.0-hotfix-1
            instanceManager:
              tag: v1.11.0-hotfix-1
        # Resource limits -- right-sized for homelab (2 worker nodes)
        longhornManager:
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
        longhornDriver:
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
        longhornUI:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
  destination:
    server: "https://kubernetes.default.svc"
    namespace: longhorn-system
  ignoreDifferences:
    # Longhorn controller injects conversion webhook caBundle and the
    # API server normalises CRD schemas post-apply.  Narrow to the
    # specific subpaths that drift rather than ignoring the entire spec.
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /spec/conversion
        - /spec/versions/0/schema
        - /spec/versions/1/schema
        - /spec/versions/2/schema
        - /status
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=false
      - RespectIgnoreDifferences=true
