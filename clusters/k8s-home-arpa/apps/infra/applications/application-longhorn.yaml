apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: "https://charts.longhorn.io"
    chart: longhorn
    # Longhorn v1.11.0 — latest major release.
    # Using vanilla v1.11.0 images (see NOTE below re: hotfix regression).
    targetRevision: 1.11.0
    helm:
      releaseName: longhorn
      valuesObject:
        persistence:
          defaultClass: true
          defaultClassReplicaCount: 2
          reclaimPolicy: "Retain"
        defaultSettings:
          # 2 worker nodes — replica count must match
          defaultReplicaCount: 2
          # Allow overprovisioning — 200% means sum of PVC requests can be 2x physical capacity.
          # Needed on 2-node homelab where each node has ~40GB but total PVC requests exceed that.
          storageOverProvisioningPercentage: 200
          # Keep 15% disk free as safety margin
          storageMinimalAvailablePercentage: 15
        # v1.11.0 moved backup settings from defaultSettings to defaultBackupStore
        defaultBackupStore:
          # TrueNAS NFS backup target — off-cluster disaster recovery
          backupTarget: "nfs://192.168.20.50:/mnt/tank/backups/longhorn"
          backupTargetCredentialSecret: ""
        preUpgradeChecker:
          # Disable pre-upgrade hook -- causes SA-not-found on fresh install via ArgoCD
          jobEnabled: false
          # Skip upgrade version check — fresh install, no migration needed
          upgradeVersionCheck: false
        # NOTE: v1.11.0-hotfix-1 images removed — the hotfix added a
        # rebuildConcurrentSyncLimit feature to the manager/instance-manager
        # but the chart v1.11.0 CRDs don't include the field in the Engine
        # spec schema. Kubernetes prunes the unknown field, causing ALL
        # engine processes to receive --rebuild-sync-concurrent-limit=0
        # and crash. Use vanilla v1.11.0 images until chart is updated.
        # Resource limits -- right-sized for homelab (2 worker nodes)
        longhornManager:
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
        longhornDriver:
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
        longhornUI:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
  destination:
    server: "https://kubernetes.default.svc"
    namespace: longhorn-system
  ignoreDifferences:
    # Longhorn manager injects conversion webhook config and the API
    # server normalises CRD schemas post-apply.  Narrowed to specific
    # sub-fields so structural CRD changes (new versions, served/storage
    # flags) remain visible in ArgoCD diff.
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jqPathExpressions:
        - .spec.conversion.webhook.clientConfig.caBundle
        - .spec.versions[].schema
        - .spec.versions[].additionalPrinterColumns
        - .status
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
      - RespectIgnoreDifferences=true
