# PodDisruptionBudgets — protect workloads during node drains.
#
# For single-replica deployments, minAvailable: 1 blocks eviction until
# the pod is rescheduled. For multi-replica (HA) deployments, it ensures
# at least 1 pod remains running during rolling drains.
#
# RKE2 upgrade strategy: sequential cordon+drain+upgrade+uncordon.
# Without PDBs, all pods are evicted simultaneously from the draining node.
---
# ── cert-manager (HA: 2 replicas each) ─────────────────────────────────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cert-manager-controller
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: cert-manager
      app.kubernetes.io/component: controller
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cert-manager-webhook
  namespace: cert-manager
