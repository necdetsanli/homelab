# PodDisruptionBudgets — protect single-replica workloads during drains.
#
# For single-replica deployments, minAvailable: 1 means node drains BLOCK
# until the pod is rescheduled to another node. This prevents data loss
# and downtime but may slow rolling upgrades. On a 3-node cluster with
# 2 workers, this is the correct trade-off.
#
# RKE2 upgrade strategy uses drain (sequential, cordon+drain+upgrade+uncordon).
# Without PDBs, all pods are evicted simultaneously from the draining node.
---
# ── monitoring ──────────────────────────────────────────────────────────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
---
