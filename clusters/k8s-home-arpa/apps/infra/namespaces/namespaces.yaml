# kube-system label overlay — adds gateway-access for Hubble UI HTTPRoute.
# kube-system is a built-in namespace; ServerSideApply merges these labels
# without touching existing ownership.
apiVersion: v1
kind: Namespace
metadata:
  name: kube-system
  labels:
    homelab.necdetsanli.io/gateway-access: "true"