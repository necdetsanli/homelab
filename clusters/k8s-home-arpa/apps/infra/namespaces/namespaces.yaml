apiVersion: v1
kind: Namespace
metadata:
  name: longhorn-system
  labels:
    homelab.necdetsanli.io/tier: platform
    homelab.necdetsanli.io/gateway-access: "true"
    # Longhorn CSI plugin + manager need privileged access for block device management
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: baseline
    pod-security.kubernetes.io/audit: baseline
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
---
apiVersion: v1
kind: Namespace
metadata:
  name: cilium-spire
  labels:
    homelab.necdetsanli.io/tier: security
    # SPIRE agent DaemonSet needs hostPath volumes for the agent socket
    # (/run/spire/agent/sockets/) and privileged capabilities for
    # workload attestation via the Kubernetes node attestor.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: baseline
    pod-security.kubernetes.io/audit: baseline
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
---
---
apiVersion: v1
kind: Namespace
metadata:
  name: tracing
  labels:
    homelab.necdetsanli.io/tier: observability
    homelab.necdetsanli.io/gateway-access: "true"
    # Jaeger all-in-one container does not set runAsNonRoot or seccompProfile;
    # baseline is sufficient.
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
---
apiVersion: v1
kind: Namespace
metadata:
  name: opentelemetry
  labels:
    homelab.necdetsanli.io/tier: observability
    # DaemonSet collector requires hostPath mounts for /proc, /sys host metrics
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: baseline
    pod-security.kubernetes.io/audit: baseline
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
---
