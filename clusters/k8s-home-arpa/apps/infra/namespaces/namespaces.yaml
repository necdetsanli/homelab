apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
  labels:
    homelab.necdetsanli.io/tier: platform
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    homelab.necdetsanli.io/tier: observability
    homelab.necdetsanli.io/gateway-access: "true"
    # Grafana init-chown-data (root, CHOWN cap), Mimir-minio, and Loki
    # sidecar containers cannot satisfy restricted; baseline is sufficient.
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
---
apiVersion: v1
kind: Namespace
metadata:
  name: logging
  labels:
    homelab.necdetsanli.io/tier: observability
    homelab.necdetsanli.io/gateway-access: "true"
    # Loki-gateway (nginx) and Elasticsearch init containers need capabilities
    # that restricted blocks; baseline is sufficient.
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
---
apiVersion: v1
