apiVersion: v1
kind: Namespace
metadata:
  name: cilium-spire
  labels:
    homelab.necdetsanli.io/tier: security
    # SPIRE agent DaemonSet needs hostPath volumes for the agent socket
    # (/run/spire/agent/sockets/) and privileged capabilities for
    # workload attestation via the Kubernetes node attestor.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: baseline
    pod-security.kubernetes.io/audit: baseline
  annotations:
    argocd.argoproj.io/sync-wave: "-2"