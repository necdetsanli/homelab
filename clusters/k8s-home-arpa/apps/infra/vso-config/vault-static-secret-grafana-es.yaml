# Grafana Elasticsearch credentials — synced from Vault KV v2 to K8s Secret.
# Creates the "grafana-es-credentials" Secret in the monitoring namespace
# so Grafana can authenticate to Elasticsearch for log analytics datasource.
#
# Vault path:  secret/monitoring/grafana-es
# Expected keys:  es-username, es-password
#
# Cross-namespace auth: references VaultAuth "default" in security namespace
# (requires allowedNamespaces on the VaultAuth — see vault-auth.yaml).
#
# Prerequisites (Vault side — run once on k8s-master-1):
#   export VAULT_ADDR=https://vault.home.arpa
#
#   # Retrieve ECK-generated elastic user password
#   kubectl get secret homelab-es-elastic-user -n logging \
#     -o jsonpath='{.data.elastic}' | base64 -d
#
#   # Store in Vault (use the password from above)
#   vault kv put secret/monitoring/grafana-es \
#     es-username="elastic" \
#     es-password="<password-from-above>"
#
#   NOTE: If the ES password is rotated by ECK, this Vault secret must be
#   updated manually. Future enhancement: automate with a CronJob or
#   VaultDynamicSecret when ECK supports external credential management.
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: grafana-es-credentials
  namespace: monitoring
spec:
  # Cross-namespace reference: "namespace/name" format
  vaultAuthRef: security/default
  mount: secret
  type: kv-v2
  path: monitoring/grafana-es
  refreshAfter: "60s"
  destination:
    name: grafana-es-credentials
    create: true
    overwrite: true
  hmacSecretData: true
