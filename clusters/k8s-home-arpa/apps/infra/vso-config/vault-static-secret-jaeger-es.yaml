# Jaeger Elasticsearch credentials — synced from Vault KV v2 to K8s Secret.
# Creates the "jaeger-es-credentials" Secret in the tracing namespace
# so Jaeger v2 can authenticate to Elasticsearch for trace storage.
#
# Vault path:  secret/tracing/jaeger-es
# Expected keys:  es-username, es-password
#
# Cross-namespace auth: references VaultAuth "default" in security namespace
# (requires allowedNamespaces on the VaultAuth — see vault-auth.yaml).
#
# Prerequisites (Vault side — run once on k8s-master-1):
#   export VAULT_ADDR=https://vault.home.arpa
#
#   # Retrieve ECK-generated elastic user password
#   kubectl get secret homelab-es-elastic-user -n logging -o jsonpath='{.data.elastic}' | base64 -d
#
#   # Store in Vault (use the password from above)
#   vault kv put secret/tracing/jaeger-es \
#     es-username="elastic" \
#     es-password="<password-from-above>"
#
#   NOTE: If the ES password is rotated by ECK, this Vault secret must be
#   updated manually. Future enhancement: automate with a CronJob or
#   External Secrets Operator push-sync.
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: jaeger-es-credentials
  namespace: tracing
spec:
  # Cross-namespace reference: "namespace/name" format
  vaultAuthRef: security/default
  mount: secret
  type: kv-v2
  path: tracing/jaeger-es
  refreshAfter: "60s"
  destination:
    name: jaeger-es-credentials
    create: true
