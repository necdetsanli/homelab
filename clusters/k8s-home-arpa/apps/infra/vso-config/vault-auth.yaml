# VSO VaultAuth — Kubernetes auth method configuration
# Authenticates VSO to Vault using the operator's ServiceAccount token.
#
# Prerequisites (Vault side):
#   - Kubernetes auth enabled at auth/kubernetes
#   - Role "vso" bound to SA "vault-secrets-operator-controller-manager"
#     in namespaces: security, monitoring, tracing
#     (VSO 1.3.0 creates TokenRequests in the VaultStaticSecret's namespace)
#   - Policy "vso" granting read on secret/data/*
#
# Traffic flow:
#   VSO pod → creates TokenRequest for SA → presents JWT to Vault K8s auth
#   Vault validates JWT via K8s TokenReview API (using vault-auth SA token)
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: default
  namespace: security
spec:
  # Reference to VaultConnection in same namespace
  vaultConnectionRef: default
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: vso
    serviceAccount: vault-secrets-operator-controller-manager
    audiences:
      - "vault"
  # Allow VaultStaticSecret resources in these namespaces to reference
  # this VaultAuth for cross-namespace secret syncing.
  allowedNamespaces:
    - monitoring
    - tracing
