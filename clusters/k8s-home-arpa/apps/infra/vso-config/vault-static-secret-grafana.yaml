# Grafana admin credentials — synced from Vault KV v2 to K8s Secret.
# Creates the "grafana-admin-credentials" Secret in the monitoring namespace
# so that Grafana can reference it via admin.existingSecret.
#
# Vault path:  secret/monitoring/grafana
# Expected keys:  admin-user, admin-password
#
# Cross-namespace auth: references VaultAuth "default" in security namespace
# (requires allowedNamespaces on the VaultAuth — see vault-auth.yaml).
#
# Prerequisites (Vault side — run once):
#   export VAULT_ADDR=https://vault.home.arpa
#
#   # Create/update Vault policy to include monitoring path
#   vault policy write vso - <<'EOF'
#   path "secret/data/*" {
#     capabilities = ["read"]
#   }
#   EOF
#
#   # Seed the Grafana admin credentials
#   vault kv put secret/monitoring/grafana \
#     admin-user="admin" \
#     admin-password="$(openssl rand -base64 24)"
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: grafana-admin-credentials
  namespace: monitoring
spec:
  # Cross-namespace reference: "namespace/name" format
  vaultAuthRef: security/default
  mount: secret
  type: kv-v2
  path: monitoring/grafana
  refreshAfter: "60s"
  destination:
    name: grafana-admin-credentials
    create: true
    overwrite: true
  hmacSecretData: true
