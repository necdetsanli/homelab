# Vault Audit Log Rotation
# Deploy to ALL Vault nodes: vault-1 (.25), vault-2 (.26), vault-3 (.27)
# Target path: /etc/logrotate.d/vault
#
# WHY: Vault audit logging is a "blocking" feature — if the audit log
# file cannot be written (e.g. disk full), Vault REFUSES all requests.
# Without rotation, the log grows unbounded and eventually fills the disk,
# causing a full Vault outage.
#
# Deploy:
#   for node in vault-1 vault-2 vault-3; do
#     scp vault-logrotate.conf ${node}:/tmp/vault
#     ssh ${node} "sudo mv /tmp/vault /etc/logrotate.d/vault && sudo chown root:root /etc/logrotate.d/vault"
#   done
#
# Verify:
#   ssh vault-1 "sudo logrotate -d /etc/logrotate.d/vault"

/var/log/vault_audit.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    maxsize 100M
}
