---
# ── Prerequisites ────────────────────────────────────────────
- name: Install required packages
  ansible.builtin.apt:
    name:
      - gnupg
      - apt-transport-https
    state: present
    update_cache: true
    cache_valid_time: 3600

# ── GPG key ──────────────────────────────────────────────────
- name: Download Wazuh GPG key
  ansible.builtin.get_url:
    url: "{{ wazuh_gpg_key_url }}"
    dest: /tmp/GPG-KEY-WAZUH
    mode: "0644"
  changed_when: false

- name: De-armor GPG key to keyring
  ansible.builtin.shell: |
    gpg --dearmor < /tmp/GPG-KEY-WAZUH > {{ wazuh_gpg_keyring }}
  args:
    creates: "{{ wazuh_gpg_keyring }}"

- name: Set keyring permissions
  ansible.builtin.file:
    path: "{{ wazuh_gpg_keyring }}"
    mode: "0644"

# ── APT repository ───────────────────────────────────────────
- name: Add Wazuh APT repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by={{ wazuh_gpg_keyring }}] {{ wazuh_repo_url }} stable main"
    filename: wazuh
    state: present
    update_cache: true

# ── Install agent ────────────────────────────────────────────
- name: Install wazuh-agent
  ansible.builtin.apt:
    name: "wazuh-agent={{ wazuh_agent_version }}"
    state: present
    update_cache: true
  environment:
    WAZUH_MANAGER: "{{ wazuh_manager_ip }}"

# ── Pin package to prevent accidental upgrades ───────────────
- name: Pin wazuh-agent package version
  ansible.builtin.dpkg_selections:
    name: wazuh-agent
    selection: hold

# ── OpenSCAP wodle integration ───────────────────────────────
- name: Configure OpenSCAP wodle in ossec.conf
  when: wazuh_openscap_enabled
  block:
    - name: Discover SCAP data-stream for Wazuh wodle
      ansible.builtin.find:
        paths: /usr/share/xml/scap/ssg/content
        patterns: >-
          {{ 'ssg-ubuntu*-ds.xml' if ansible_distribution == 'Ubuntu'
             else 'ssg-debian*-ds.xml' }}
      register: _wazuh_scap_files

    - name: Set SCAP content path fact
      ansible.builtin.set_fact:
        _wazuh_scap_content: >-
          {{ (_wazuh_scap_files.files | sort(attribute='path') | last).path }}
      when: _wazuh_scap_files.files | length > 0

    - name: Set SCAP profile fact
      ansible.builtin.set_fact:
        _wazuh_scap_profile: >-
          {{ 'xccdf_org.ssgproject.content_profile_cis_level1_server'
             if ansible_distribution == 'Ubuntu'
             else 'xccdf_org.ssgproject.content_profile_standard' }}

    - name: Inject open-scap wodle into ossec.conf
      ansible.builtin.blockinfile:
        path: /var/ossec/etc/ossec.conf
        marker: "  <!-- {mark} ANSIBLE MANAGED: open-scap wodle -->"
        insertbefore: "</ossec_config>"
        block: |
          <wodle name="open-scap">
            <disabled>no</disabled>
            <timeout>{{ wazuh_openscap_timeout }}</timeout>
            <interval>{{ wazuh_openscap_interval }}</interval>
            <scan-on-start>{{ 'yes' if wazuh_openscap_scan_on_start else 'no' }}</scan-on-start>
            <content type="xccdf" path="{{ _wazuh_scap_content }}">
              <profile>{{ _wazuh_scap_profile }}</profile>
            </content>
          </wodle>
      notify: Restart wazuh-agent
      when: _wazuh_scap_content is defined

# ── Enable and start service ─────────────────────────────────
- name: Enable and start wazuh-agent
  ansible.builtin.systemd:
    name: wazuh-agent
    state: started
    enabled: true
    daemon_reload: true
