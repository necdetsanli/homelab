---
# ── Prerequisites ────────────────────────────────────────────
- name: Install required packages
  ansible.builtin.apt:
    name:
      - gnupg
      - apt-transport-https
    state: present
    update_cache: true
    cache_valid_time: 3600

# ── GPG key ──────────────────────────────────────────────────
- name: Download Wazuh GPG key
  ansible.builtin.get_url:
    url: "{{ wazuh_gpg_key_url }}"
    dest: /tmp/GPG-KEY-WAZUH
    mode: "0644"
  changed_when: false

- name: De-armor GPG key to keyring
  ansible.builtin.shell: |
    gpg --dearmor < /tmp/GPG-KEY-WAZUH > {{ wazuh_gpg_keyring }}
  args:
    creates: "{{ wazuh_gpg_keyring }}"

- name: Set keyring permissions
  ansible.builtin.file:
    path: "{{ wazuh_gpg_keyring }}"
    mode: "0644"

# ── APT repository ───────────────────────────────────────────
- name: Add Wazuh APT repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by={{ wazuh_gpg_keyring }}] {{ wazuh_repo_url }} stable main"
    filename: wazuh
    state: present
    update_cache: true

# ── Install agent ────────────────────────────────────────────
- name: Install wazuh-agent
  ansible.builtin.apt:
    name: "wazuh-agent={{ wazuh_agent_version }}"
    state: present
    update_cache: true
  environment:
    WAZUH_MANAGER: "{{ wazuh_manager_ip }}"

# ── Pin package to prevent accidental upgrades ───────────────
- name: Pin wazuh-agent package version
  ansible.builtin.dpkg_selections:
    name: wazuh-agent
    selection: hold

# ── Enable and start service ─────────────────────────────────
- name: Enable and start wazuh-agent
  ansible.builtin.systemd:
    name: wazuh-agent
    state: started
    enabled: true
    daemon_reload: true
