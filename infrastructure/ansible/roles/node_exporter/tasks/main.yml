---
# node_exporter role — install Prometheus node_exporter from GitHub release
# Targets: all FreeIPA-enrolled hosts (Ubuntu + Debian)
# Method: static binary (no apt repo needed), systemd unit, dedicated user

- name: Check current node_exporter version
  ansible.builtin.command: "{{ node_exporter_install_dir }}/node_exporter --version"
  register: _ne_version_check
  changed_when: false
  failed_when: false

- name: Set node_exporter needs install/upgrade fact
  ansible.builtin.set_fact:
    _ne_needs_install: >-
      {{ _ne_version_check.rc != 0 or
         ('node_exporter, version ' + node_exporter_version) not in
         ((_ne_version_check.stdout | default('')) + (_ne_version_check.stderr | default(''))) }}

# ── System user & directories ────────────────────────────────
- name: Create node_exporter group
  ansible.builtin.group:
    name: "{{ node_exporter_group }}"
    system: true
    state: present

- name: Create node_exporter user
  ansible.builtin.user:
    name: "{{ node_exporter_user }}"
    group: "{{ node_exporter_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: /nonexistent
    create_home: false
    state: present

- name: Create textfile collector directory
  ansible.builtin.file:
    path: "{{ node_exporter_textfile_dir }}"
    state: directory
    owner: "{{ node_exporter_user }}"
    group: "{{ node_exporter_group }}"
    mode: "0755"

# ── Download & install binary ────────────────────────────────
- name: Download node_exporter tarball
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
    dest: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
    checksum: "{{ node_exporter_checksum }}"
    mode: "0644"
  when: _ne_needs_install

- name: Extract node_exporter binary
  ansible.builtin.unarchive:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
    dest: "/tmp"
    remote_src: true
    creates: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
  when: _ne_needs_install

- name: Install node_exporter binary
  ansible.builtin.copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
    dest: "{{ node_exporter_install_dir }}/node_exporter"
    remote_src: true
    owner: root
    group: root
    mode: "0755"
  when: _ne_needs_install
  notify: Restart node_exporter

- name: Clean up tarball and extracted directory
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
    - "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64"
  when: _ne_needs_install

# ── Systemd unit ─────────────────────────────────────────────
- name: Deploy node_exporter systemd unit
  ansible.builtin.template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart node_exporter

- name: Enable and start node_exporter
  ansible.builtin.systemd:
    name: node_exporter
    enabled: true
    state: started
    daemon_reload: true
