---
# alloy_k3s — deploy Grafana Alloy Helm chart to a k3s cluster
#
# Uses kubernetes.core.helm to manage the release. The Alloy config
# is passed inline via Helm values so it's fully template-driven.

- name: Add Grafana Helm repository
  kubernetes.core.helm_repository:
    name: grafana
    repo_url: "{{ alloy_k3s_chart_repo }}"
    kubeconfig: "{{ alloy_k3s_kubeconfig }}"

- name: Deploy Alloy Helm chart
  kubernetes.core.helm:
    name: "{{ alloy_k3s_release_name }}"
    chart_ref: "{{ alloy_k3s_chart_name }}"
    chart_version: "{{ alloy_k3s_chart_version }}"
    release_namespace: "{{ alloy_k3s_namespace }}"
    create_namespace: true
    kubeconfig: "{{ alloy_k3s_kubeconfig }}"
    wait: true
    timeout: "5m0s"
    values: "{{ lookup('template', 'values.yml.j2') | from_yaml }}"
