---
galaxy_info:
  namespace: homelab
  role_name: common
  author: necdetsanli
  description: >-
    Baseline OS configuration applied to all managed hosts. Sets timezone
    and locale, installs common diagnostic/admin packages, configures
    chrony NTP (skipped on LXC containers), deploys unattended-upgrades
    for automatic security patching, applies sysctl kernel hardening,
    configures journald disk limits, and deploys a custom MOTD banner.
  license: MIT
  min_ansible_version: "2.15"
  platforms:
    - name: Ubuntu
      versions:
        - noble    # 24.04
    - name: Debian
      versions:
        - trixie   # 13
  galaxy_tags:
    - common
    - baseline
    - hardening
    - ntp
    - sysctl
dependencies: []
