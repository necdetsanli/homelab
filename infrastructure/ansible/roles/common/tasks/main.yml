---
# ── Timezone ─────────────────────────────────────────────────
- name: Set timezone
  community.general.timezone:
    name: "{{ common_timezone }}"

# ── Locale ───────────────────────────────────────────────────
- name: Ensure locale is generated
  ansible.builtin.locale_gen:
    name: "{{ common_locale }}"
    state: present

- name: Set default locale
  ansible.builtin.copy:
    dest: /etc/default/locale
    content: |
      LANG={{ common_locale }}
      LC_ALL={{ common_locale }}
    mode: "0644"

# ── Common packages ──────────────────────────────────────────
- name: Install common packages
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Install Ubuntu-only packages
  ansible.builtin.apt:
    name: "{{ common_packages_ubuntu }}"
    state: present
  when: ansible_distribution == 'Ubuntu'

# ── NTP (chrony) ─────────────────────────────────────────────
# LXC containers inherit time from the Proxmox host — chrony cannot
# adjust the clock inside an unprivileged container.
- name: Install chrony
  ansible.builtin.apt:
    name: chrony
    state: present
  when:
    - common_ntp_enabled
    - ansible_virtualization_type != 'lxc'

- name: Deploy chrony configuration
  ansible.builtin.template:
    src: chrony.conf.j2
    dest: /etc/chrony/chrony.conf
    mode: "0644"
    backup: true
  when:
    - common_ntp_enabled
    - ansible_virtualization_type != 'lxc'
  notify: Restart chrony

- name: Enable and start chrony
  ansible.builtin.systemd:
    name: chrony
    state: started
    enabled: true
  when:
    - common_ntp_enabled
    - ansible_virtualization_type != 'lxc'

# ── Unattended upgrades ─────────────────────────────────────
# Ansible owns the patching lifecycle — disable unattended-upgrades
# to prevent apt lock races during playbook runs.
- name: Stop and disable unattended-upgrades
  ansible.builtin.systemd:
    name: unattended-upgrades
    state: stopped
    enabled: false
  failed_when: false
  when: not common_unattended_upgrades

- name: Remove unattended-upgrades package
  ansible.builtin.apt:
    name:
      - unattended-upgrades
    state: absent
    purge: true
  when: not common_unattended_upgrades

- name: Remove auto-upgrade apt config
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/apt.conf.d/20auto-upgrades
    - /etc/apt/apt.conf.d/50unattended-upgrades
  when: not common_unattended_upgrades

# Disable apt-daily timers — these trigger background apt operations
# (cache updates, package downloads) that hold the dpkg lock.
- name: Disable apt-daily timers
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
    masked: true
  loop:
    - apt-daily.timer
    - apt-daily-upgrade.timer
    - apt-daily.service
    - apt-daily-upgrade.service
  failed_when: false
  when: not common_unattended_upgrades

# ── Scheduled apt upgrade (Ansible controller only) ─────────
# Systemd timer runs apt-upgrade.yml weekly on the controller.
- name: Deploy apt-upgrade systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/ansible-apt-upgrade.service
    content: |
      # Managed by Ansible - do not edit
      [Unit]
      Description=Ansible weekly apt upgrade for all hosts
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      User=svc-ansible
      WorkingDirectory=/opt/homelab/infrastructure/ansible
      ExecStart=/usr/bin/ansible-playbook {{ common_apt_upgrade_playbook }}
      StandardOutput=journal
      StandardError=journal
      SyslogIdentifier=ansible-apt-upgrade
    mode: "0644"
  when:
    - common_apt_upgrade_timer_enabled
    - inventory_hostname == 'ansible.home.arpa'
  notify: Reload systemd

- name: Deploy apt-upgrade systemd timer
  ansible.builtin.copy:
    dest: /etc/systemd/system/ansible-apt-upgrade.timer
    content: |
      # Managed by Ansible - do not edit
      [Unit]
      Description=Weekly Ansible apt upgrade timer

      [Timer]
      OnCalendar={{ common_apt_upgrade_timer_calendar }}
      Persistent=true
      RandomizedDelaySec=300

      [Install]
      WantedBy=timers.target
    mode: "0644"
  when:
    - common_apt_upgrade_timer_enabled
    - inventory_hostname == 'ansible.home.arpa'
  notify: Reload systemd

- name: Enable apt-upgrade timer
  ansible.builtin.systemd:
    name: ansible-apt-upgrade.timer
    state: started
    enabled: true
    daemon_reload: true
  when:
    - common_apt_upgrade_timer_enabled
    - inventory_hostname == 'ansible.home.arpa'

# ── Sysctl hardening ────────────────────────────────────────
# LXC containers share the host kernel — some sysctl keys are read-only.
# We skip failures gracefully on LXCs.
- name: Apply sysctl settings
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_set: true
    state: present
    reload: true
  loop: "{{ common_sysctl | dict2items }}"
  failed_when: false
  when: ansible_virtualization_type != 'lxc'

# ── Journald ─────────────────────────────────────────────────
- name: Configure journald disk usage
  ansible.builtin.template:
    src: journald.conf.j2
    dest: /etc/systemd/journald.conf
    mode: "0644"
  notify: Restart journald

# ── MOTD ─────────────────────────────────────────────────────
- name: Deploy custom MOTD
  ansible.builtin.template:
    src: motd.j2
    dest: /etc/motd
    mode: "0644"
  when: common_motd_enabled

- name: Disable default dynamic MOTD scripts
  ansible.builtin.file:
    path: "/etc/update-motd.d/{{ item }}"
    mode: "0644"
  loop:
    - 10-help-text
    - 50-motd-news
    - 91-release-upgrade
  failed_when: false
  when: common_motd_enabled
