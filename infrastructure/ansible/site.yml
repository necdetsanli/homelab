---
# Master playbook — converge all roles on all FreeIPA-enrolled hosts
# Usage:
#   ansible-playbook site.yml                          # full run
#   ansible-playbook site.yml --limit vault            # single group
#   ansible-playbook site.yml --tags sshd              # single role
- name: Converge all baseline roles
  hosts: freeipa_enrolled
  roles:
    - role: common
      tags: [common]
    - role: sssd
      tags: [sssd]
    - role: sshd
      tags: [sshd]
    - role: wazuh_agent
      tags: [wazuh_agent]

# node_exporter — skip K8s nodes (managed by kube-prometheus-stack DaemonSet)
- name: Deploy node_exporter (non-K8s hosts)
  hosts: freeipa_enrolled:!k8s_masters:!k8s_workers
  tags: [node_exporter]
  roles:
    - node_exporter

# firewall — nftables east-west control (skip K8s — Cilium manages networking)
- name: Deploy nftables firewall (non-K8s hosts)
  hosts: freeipa_enrolled:!k8s_masters:!k8s_workers
  tags: [firewall]
  roles:
    - firewall
