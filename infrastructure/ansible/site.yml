---
# Master playbook — converge all roles on all FreeIPA-enrolled hosts
# Usage:
#   ansible-playbook site.yml                          # full run
#   ansible-playbook site.yml --limit vault            # single group
#   ansible-playbook site.yml --tags sshd              # single role
- name: Converge all baseline roles
  hosts: freeipa_enrolled
  roles:
    - role: common
      tags: [common]
    - role: sssd
      tags: [sssd]
    - role: sshd
      tags: [sshd]
    - role: wazuh_agent
      tags: [wazuh_agent]

# node_exporter — skip K8s nodes (managed by kube-prometheus-stack DaemonSet)
- name: Deploy node_exporter (non-K8s hosts)
  hosts: freeipa_enrolled:!k8s_masters:!k8s_workers
  tags: [node_exporter]
  roles:
    - node_exporter

# firewall — nftables east-west control (skip K8s — Cilium manages networking)
- name: Deploy nftables firewall (non-K8s hosts)
  hosts: freeipa_enrolled:!k8s_masters:!k8s_workers
  tags: [firewall]
  roles:
    - firewall

# openscap — CIS/standard compliance scanning (skip K8s + Rancher)
- name: Deploy OpenSCAP compliance scanner
  hosts: freeipa_enrolled:!k8s_masters:!k8s_workers:!rancher
  tags: [openscap]
  roles:
    - openscap

# grafana_alloy — bare-metal telemetry agent (logs → Loki, metrics → Mimir)
# K8s nodes use the in-cluster OTel Collector DaemonSet instead.
- name: Deploy Grafana Alloy telemetry agent
  hosts: freeipa_enrolled:!k8s_masters:!k8s_workers
  tags: [grafana_alloy]
  roles:
    - grafana_alloy
