---
# Deploy Grafana Alloy telemetry agent to bare-metal hosts.
# Ships journald logs → Loki, scrapes node_exporter → Mimir.
#
# Usage:
#   ansible-playbook playbooks/alloy.yml
#   ansible-playbook playbooks/alloy.yml --limit vault
- name: Deploy Grafana Alloy telemetry agent
  hosts: freeipa_enrolled:!k8s_masters:!k8s_workers
  roles:
    - grafana_alloy
