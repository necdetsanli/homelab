---
# Ansible Galaxy collection dependencies for homelab infrastructure.
# Install with:
#   ansible-galaxy collection install -r requirements.yml
#   ansible-galaxy collection install -r requirements.yml --force   # upgrade
#
# These collections ship with ansible-core but are pinned here for
# reproducibility on a fresh controller bootstrap.
collections:
  # ansible.builtin ships with ansible-core — do NOT list it here.

  - name: ansible.posix
    version: ">=1.5.0"       # sysctl (common role)

  - name: community.general
    version: ">=8.0.0"       # timezone (common role)

  - name: kubernetes.core
    version: ">=4.0.0"       # helm, k8s (alloy_k3s role)
