# Ansible configuration for homelab infrastructure.
# Run playbooks from the ansible directory:
#   cd infrastructure/ansible && ansible-playbook playbooks/<playbook>.yml
[defaults]
inventory = inventory/hosts.yml
roles_path = roles
retry_files_enabled = false
host_key_checking = false
stdout_callback = yaml
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts_cache
fact_caching_timeout = 3600
private_key_file = /home/svc-ansible/.ssh/svc-ansible
vault_password_file = ~/.ansible/vault_password
remote_tmp = /tmp/.ansible-${USER}/tmp

# SSH performance
forks = 10
pipelining = true

[privilege_escalation]
become = true
become_method = sudo
become_user = root
become_ask_pass = false

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
