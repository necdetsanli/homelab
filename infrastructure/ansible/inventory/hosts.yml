---
# Homelab Infrastructure Inventory
# ──────────────────────────────────────────────────────────────
# Proxmox VE 9.1.5 — HP ProLiant DL380 G9
# Network: vmbr0 (VLAN-aware trunk), vmbr1 (OPNsense WAN)
# VLANs: 20=servers, 50=management
# Storage: local-lvm (LVM-Thin, 875GB NVMe)
# ──────────────────────────────────────────────────────────────
all:
  children:
    # ── Layer 1/2: Virtual Machines ─────────────────────────────
    # Management hosts NOT managed by Ansible:
    #   - proxmox (192.168.50.10)  — Terraform API + manual SSH
    #   - opnsense (192.168.50.1)  — config XML
    #   - freeipa (192.168.50.5)   — IPA CLI / Web UI
    #   - wazuh (192.168.50.4)     — Wazuh API
    #   - truenas (192.168.20.50)  — GUI only (CLI changes not supported)

    k8s_masters:
      hosts:
        k8s-master-1.home.arpa:
          ansible_host: 192.168.20.30
          vmid: 200

    k8s_workers:
      hosts:
        k8s-worker-1.home.arpa:
          ansible_host: 192.168.20.40
          vmid: 201
        k8s-worker-2.home.arpa:
          ansible_host: 192.168.20.41
          vmid: 202

    rancher:
      hosts:
        rancher.home.arpa:
          ansible_host: 192.168.20.60
          vmid: 203

    vault:
      hosts:
        vault-1.home.arpa:
          ansible_host: 192.168.20.25
          vmid: 206
        vault-2.home.arpa:
          ansible_host: 192.168.20.26
          vmid: 207
        vault-3.home.arpa:
          ansible_host: 192.168.20.27
          vmid: 208

    nextcloud:
      hosts:
        nextcloud.home.arpa:
          ansible_host: 192.168.20.51
          vmid: 301

    # ── Layer 1/2: LXC Containers ──────────────────────────────
    edge:
      hosts:
        edge-1.home.arpa:
          ansible_host: 192.168.20.20
          ctid: 204
        edge-2.home.arpa:
          ansible_host: 192.168.20.21
          ctid: 205

    # Alpine LXCs — no FreeIPA client, use local root
    unifi:
      hosts:
        unifi.home.arpa:
          ansible_host: 192.168.20.10
          ansible_user: root
          ctid: 101

    adguard:
      hosts:
        adguard.home.arpa:
          ansible_host: 192.168.20.53
          ansible_user: root
          ctid: 102

    meshtastic:
      hosts:
        meshtastic.home.arpa:
          ansible_host: 192.168.20.70
          ctid: 210

    ansible_ctrl:
      hosts:
        ansible.home.arpa:
          ansible_host: 192.168.20.80
          ctid: 103
          # No ansible_connection: local — SSH to itself as svc-ansible
          # for consistent identity, sudo, and audit trail

    # ── Logical groups ─────────────────────────────────────────
    # FreeIPA-enrolled hosts — target for sshd hardening, HBAC, sudo
    # Excludes: opnsense, truenas (no FreeIPA), unifi/adguard (Alpine, no SSSD)
    freeipa_enrolled:
      children:
        k8s_masters:
        k8s_workers:
        rancher:
        vault:
        nextcloud:
        edge:
        meshtastic:
        ansible_ctrl:

    # ── Planned: MinIO for Terraform state / Velero / Loki ─────
    # minio:
    #   hosts:
    #     minio.home.arpa:
    #       ansible_host: 192.168.20.55
    #       ctid: TBD

  vars:
    # FreeIPA service account — used by all hosts except overrides above
    # Create in FreeIPA:  ipa user-add svc-ansible --first=Ansible --last=Service --shell=/bin/bash
    # Grant sudo:         ipa sudorule-add ansible-all --cmdcat=all --hostcat=all
    #                     ipa sudorule-add-user ansible-all --users=svc-ansible
    ansible_user: svc-ansible
    ansible_python_interpreter: /usr/bin/python3
    domain: home.arpa
    dns_servers:
      - 192.168.20.53   # AdGuard
    ntp_server: 192.168.20.1  # OPNsense
