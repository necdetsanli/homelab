---
# Rancher — firewall + Vault PKI certificate

# k3s host — Rancher runs on native k3s (not Docker).
# Forward chain must allow pod traffic via CNI bridge (flannel).
firewall_k3s_host: true

# Port: 30080 (HTTP NodePort — Rancher on k3s, TLS terminated at HAProxy)
# Port: 30443 (HTTPS NodePort — Rancher direct access + cattle-cluster-agent)
firewall_allow_rules:
  - port: 30080
    proto: tcp
    sources:
      - "192.168.20.20/32"     # edge-1 (HAProxy)
      - "192.168.20.21/32"     # edge-2 (HAProxy)
      - "192.168.20.22/32"     # edge VIP (keepalived)
    comment: "Rancher HTTP NodePort (HAProxy → plain HTTP)"
  - port: 30443
    proto: tcp
    sources:
      - "10.42.0.0/16"         # K8s pods — cattle-cluster-agent
    comment: "Rancher HTTPS NodePort (cluster agent internal)"

# Vault PKI certificate — issued by vault_cert role
# export VAULT_SECRET_ID=xxx && ansible-playbook playbooks/vault-cert.yml --limit rancher
vault_cert_approle_role_id: "992c55e7-cb37-bac6-fe5c-1d9152aa8a0d"
vault_cert_common_name: "rancher.mgmt.home.arpa"
vault_cert_deploy: "k8s"
vault_cert_k8s_namespace: "cattle-system"
vault_cert_k8s_tls_secret: "tls-rancher-ingress"
vault_cert_k8s_ca_secret: "tls-ca"
vault_cert_k8s_kubeconfig: "/etc/rancher/k3s/k3s.yaml"
